<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Registro de jornada</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Control de Asistencia</h1>

  <button onclick="cargarResumen()">Actualizar</button>

  <div id="panel"></div>

  <p id="mensaje"></p>
  <hr>

  <h2>Registrar</h2>

  <select id="empleado_id">
    <option value="">Selecciona empleado</option>
    <option value="1">Camilo</option>
    <option value="2">Ronald</option>
    <option value="3">Melany</option>
  </select>

  <div>
    <button onclick="marcar('entrada')">Entrada</button>
    <button onclick="marcar('salida')">Salida</button>
  </div>

  <div>
    <button onclick="marcar('inicio_comida')">Inicio comida</button>
    <button onclick="marcar('fin_comida')">Fin comida</button>
  </div>

  <div>
    <button onclick="marcar('inicio_descanso')">Inicio descanso</button>
    <button onclick="marcar('fin_descanso')">Fin descanso</button>
  </div>

  <script src="script.js"></script>

</body>
</html>
